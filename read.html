
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca - Kisah Tabu</title>
    <link rel="stylesheet" href="css/read.css">
</head>
<body>
    <header class="read-header" id="readHeader">
        <button id="backBtn" class="nav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
        </button>
        <span id="headerTitle" class="header-title">Kisah Tabu</span>
        <div class="header-actions">
            <button id="readBookmarkBtn" class="icon-btn" title="Bookmark">
                <svg class="bookmark-outline" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
                <svg class="bookmark-filled" width="18" height="18" viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
            </button>
            <button id="chapterListBtn" class="icon-btn" title="Daftar Bab">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"/>
                    <line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/>
                    <line x1="3" y1="6" x2="3.01" y2="6"/>
                    <line x1="3" y1="12" x2="3.01" y2="12"/>
                    <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
            </button>
        </div>
    </header>

    <main id="readContent" class="read-content">
        <!-- Konten chapter -->
    </main>

    <footer class="read-footer" id="readFooter">
        <button id="prevBtn" class="footer-nav-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Sebelumnya</span>
        </button>
        <span id="chapterIndicator">Bab 01</span>
        <button id="nextBtn" class="footer-nav-btn">
            <span>Selanjutnya</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </footer>

    <div id="chapterOverlay" class="chapter-overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h3>Daftar Bab</h3>
                <button id="closeOverlay" class="close-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div id="overlayChapterList"></div>
        </div>
    </div>

    <!-- PENTING: api.js sebelum read.js -->
    <script src="js/api.js"></script>
    <script src="js/read.js"></script>
</body>
</html>
